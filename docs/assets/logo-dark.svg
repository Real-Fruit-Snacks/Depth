<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: sapphire to lavender (3-stop, 40% mid) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="40%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b4befe"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>

    <!-- Icon gradient: vertical -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="50%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Bar gradient: horizontal sapphire to lavender -->
    <linearGradient id="gBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#74c7ec" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#74c7ec" opacity="0.04"/>

    <!-- === PROTOCOL STACK === -->

    <!-- Layer 1 (top, widest) — Application -->
    <rect x="32" y="30" width="96" height="5" rx="2.5"
          fill="url(#gBar)" opacity="0.9"/>

    <!-- Connector 1-2 -->
    <line x1="80" y1="35" x2="80" y2="48"
          stroke="#89b4fa" stroke-width="0.8" opacity="0.4"/>

    <!-- Layer 2 — Transport -->
    <rect x="38" y="48" width="84" height="5" rx="2.5"
          fill="url(#gBar)" opacity="0.78"/>

    <!-- Connector 2-3 -->
    <line x1="80" y1="53" x2="80" y2="66"
          stroke="#89b4fa" stroke-width="0.8" opacity="0.35"/>

    <!-- Layer 3 — Channel -->
    <rect x="44" y="66" width="72" height="5" rx="2.5"
          fill="url(#gBar)" opacity="0.65"/>

    <!-- Connector 3-4 -->
    <line x1="80" y1="71" x2="80" y2="84"
          stroke="#b4befe" stroke-width="0.8" opacity="0.3"/>

    <!-- Layer 4 — Encryption -->
    <rect x="50" y="84" width="60" height="5" rx="2.5"
          fill="url(#gBar)" opacity="0.55"/>

    <!-- Connector 4-5 -->
    <line x1="80" y1="89" x2="80" y2="102"
          stroke="#b4befe" stroke-width="0.8" opacity="0.25"/>

    <!-- Layer 5 (bottom, narrowest) — Crypto foundation -->
    <rect x="56" y="102" width="48" height="5" rx="2.5"
          fill="url(#gBar)" opacity="0.45"/>

    <!-- Top layer accent node -->
    <circle cx="80" cy="32" r="2.5" fill="#74c7ec" opacity="0.8"/>

    <!-- Bottom layer accent ring -->
    <circle cx="80" cy="105" r="4" fill="none" stroke="#b4befe" stroke-width="0.8" opacity="0.5"/>
    <circle cx="80" cy="105" r="2" fill="#b4befe" opacity="0.7"/>

    <!-- Scattered particles between layers -->
    <circle cx="52" cy="42" r="1.2" fill="#74c7ec" opacity="0.3"/>
    <circle cx="108" cy="40" r="1.3" fill="#89b4fa" opacity="0.25"/>
    <circle cx="46" cy="59" r="1.1" fill="#89b4fa" opacity="0.22"/>
    <circle cx="112" cy="57" r="1.2" fill="#89b4fa" opacity="0.25"/>
    <circle cx="55" cy="77" r="1.0" fill="#b4befe" opacity="0.2"/>
    <circle cx="105" cy="75" r="1.1" fill="#b4befe" opacity="0.2"/>
    <circle cx="62" cy="95" r="1.2" fill="#b4befe" opacity="0.18"/>
    <circle cx="98" cy="93" r="1.1" fill="#b4befe" opacity="0.18"/>
    <circle cx="68" cy="112" r="1.0" fill="#b4befe" opacity="0.15"/>
    <circle cx="92" cy="114" r="1.0" fill="#b4befe" opacity="0.15"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#74c7ec" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#b4befe" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "DEPTH" -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">DEPTH</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">SSH-2.0 IN PURE ASSEMBLY</text>

  <!-- Descriptor -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">NASM  ·  ED25519  ·  X25519  ·  94KB</text>
</svg>